<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Entrar — CPF</title>

    <!-- CSS mínimo apenas para acessibilidade (sr-only e skip link no foco) -->
    <style>
      .sr-only {
        position: absolute !important;
        width: 1px !important;
        height: 1px !important;
        padding: 0 !important;
        margin: -1px !important;
        overflow: hidden !important;
        clip: rect(0, 0, 0, 0) !important;
        white-space: nowrap !important;
        border: 0 !important;
      }
      .skip-link {
        position: absolute;
        left: -9999px;
        top: 0;
      }
      .skip-link:focus {
        left: 0;
      }
    </style>

    <script src="script.js" defer></script>
  </head>

  <body data-page="cpf">
    <!-- Skip links -->
    <a class="skip-link" href="#conteudo-principal">Pular para o conteúdo principal</a>
    <a class="skip-link" href="#form-cpf">Pular para o formulário</a>

    <header>
      <nav aria-label="Navegação superior">
        <button type="button" id="back">
          <span aria-hidden="true">←</span>
          <span class="sr-only">Voltar para a tela anterior</span>
        </button>

        <span id="titulo-tela">Entrar na minha conta</span>
      </nav>
    </header>

    <main id="conteudo-principal">
      <section aria-labelledby="titulo-secao" aria-describedby="descricao-secao">
        <h1 id="titulo-secao">Qual o seu CPF?</h1>
        <p id="descricao-secao">
          Usaremos essa informação para verificar o seu acesso ao Portal.
        </p>

        <!-- Mensagens globais não urgentes -->
        <div
          id="mensagens"
          role="status"
          aria-live="polite"
          aria-atomic="true"
          tabindex="-1"
        ></div>

        <form id="form-cpf" novalidate aria-labelledby="titulo-secao" aria-describedby="descricao-secao">
          <fieldset>
            <legend>Identificação</legend>

            <label id="cpf-label" for="cpf">CPF</label>

            <p id="cpf-ajuda">
              Campo CPF Digite 11 números.
            </p>

            <!-- Grupo para input + (se no futuro houver botão/ajuda ao lado) -->
            <div role="group" aria-labelledby="cpf-label" aria-describedby="cpf-ajuda">
              <input
                id="cpf"
                name="cpf"
                type="text"
                inputmode="numeric"
                autocomplete="username"
                autocapitalize="none"
                spellcheck="false"
                required

                placeholder="000.000.000-00"

                aria-describedby="cpf-ajuda cpf-erro"
                aria-invalid="false"

                maxlength="14"
                pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
              />
            </div>

            <!-- Erro urgente do campo -->
            <p id="cpf-erro" role="alert"></p>

            <button type="submit" id="next">Próximo</button>
          </fieldset>
        </form>
      </section>

      <aside aria-label="Ajuda e suporte">
        <p>
          Está com dúvida?
          <a href="index.html#referencias">Ver referências</a>
        </p>
      </aside>
    </main>
  </body>
</html>
